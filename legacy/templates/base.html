{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}wuild{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body class="{% block body_class %}{% endblock %}">
  <header class="site-header">
    <nav class="nav">
      <a href="{% url 'core:home' %}" class="brand">wuild</a>
      <span class="nav-links">
        <a href="{% url 'core:spoke_calculator' %}">Spokes</a>
        <a href="{% url 'core:tension_map' %}">Tension</a>
      </span>
    </nav>
  </header>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  {% block extra_js %}{% endblock %}
</body>
</html>
